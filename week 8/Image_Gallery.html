<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Photography Portfolio - Waterfalls & Landscapes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            color: #333;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 2rem;
            background: linear-gradient(to right, #2c3e50, #3498db);
            color: white;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .thumbnail {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .thumbnail:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .thumbnail img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(255,255,255,0.3);
            transform: scale(0.8);
            animation: lightboxOpen 0.3s ease forwards;
        }

        @keyframes lightboxOpen {
            to {
                transform: scale(1);
            }
        }

        .lightbox-nav {
            position: fixed;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 2rem;
            pointer-events: none;
        }

        .nav-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.3s;
            pointer-events: all;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.4);
        }

        .close-btn {
            position: fixed;
            top: 2rem;
            right: 2rem;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 2rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            pointer-events: all;
        }

        .close-btn:hover {
            background: rgba(255,255,255,0.4);
        }

        @media (max-width: 768px) {
            .gallery {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                padding: 1rem;
            }

            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Nature's Masterpieces</h1>
        <p class="subtitle">Capturing the beauty of waterfalls and landscapes</p>
    </header>

    <div class="gallery" id="gallery">
        <!-- 9 Reliable Nature-style Images from Picsum (fixed seeds for waterfalls/landscapes vibe, high reliability) -->
        <div class="thumbnail" data-full="https://picsum.photos/1200/800?random=101">
            <img src="https://picsum.photos/400/300?random=101" alt="Majestic Waterfall 1">
        </div>
        <div class="thumbnail" data-full="https://picsum.photos/1200/800?random=102">
            <img src="https://picsum.photos/400/300?random=102" alt="Forest Waterfall">
        </div>
        <div class="thumbnail" data-full="https://picsum.photos/1200/800?random=103">
            <img src="https://picsum.photos/400/300?random=103" alt="Cascade Falls">
        </div>
        <div class="thumbnail" data-full="https://picsum.photos/1200/800?random=104">
            <img src="https://picsum.photos/400/300?random=104" alt="Mountain Stream">
        </div>
        <div class="thumbnail" data-full="https://picsum.photos/1200/800?random=105">
            <img src="https://picsum.photos/400/300?random=105" alt="Tropical Waterfall">
        </div>
        <div class="thumbnail" data-full="https://picsum.photos/1200/800?random=106">
            <img src="https://picsum.photos/400/300?random=106" alt="River Rapids">
        </div>
        <div class="thumbnail" data-full="https://picsum.photos/1200/800?random=107">
            <img src="https://picsum.photos/400/300?random=107" alt="Landscape with Falls">
        </div>
        <div class="thumbnail" data-full="https://picsum.photos/1200/800?random=108">
            <img src="https://picsum.photos/400/300?random=108" alt="Misty Waterfall">
        </div>
        <div class="thumbnail" data-full="https://picsum.photos/1200/800?random=109">
            <img src="https://picsum.photos/400/300?random=109" alt="Epic Nature Falls">
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <img id="lightbox-img" src="" alt="Full Image">
        <div class="lightbox-nav">
            <button class="nav-btn" id="prev"><</button>
            <button class="nav-btn" id="next">></button>
        </div>
        <button class="close-btn" id="close">&times;</button>
    </div>

    <script>
        const gallery = document.getElementById('gallery');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const prevBtn = document.getElementById('prev');
        const nextBtn = document.getElementById('next');
        const closeBtn = document.getElementById('close');

        let currentIndex = 0;
        const thumbnails = document.querySelectorAll('.thumbnail');

        thumbnails.forEach((thumb, index) => {
            thumb.addEventListener('click', () => openLightbox(index));
        });

        function openLightbox(index) {
            currentIndex = index;
            lightboxImg.src = thumbnails[index].dataset.full;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % thumbnails.length;
            lightboxImg.src = thumbnails[currentIndex].dataset.full;
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + thumbnails.length) % thumbnails.length;
            lightboxImg.src = thumbnails[currentIndex].dataset.full;
        }

        prevBtn.addEventListener('click', prevImage);
        nextBtn.addEventListener('click', nextImage);
        closeBtn.addEventListener('click', closeLightbox);

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) closeLightbox();
        });

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            switch(e.key) {
                case 'Escape': closeLightbox(); break;
                case 'ArrowLeft': prevImage(); break;
                case 'ArrowRight': nextImage(); break;
            }
        });
    </script>
</body>
</html>
